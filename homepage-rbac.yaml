---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-sa
  namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-stats-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-stats-binding
subjects:
- kind: ServiceAccount
  name: homepage-sa
  namespace: apps
roleRef:
  kind: ClusterRole
  name: homepage-stats-reader
  apiGroup: rbac.authorization.k8s.io
